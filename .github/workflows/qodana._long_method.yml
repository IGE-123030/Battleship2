# 122983- Mariana Fonseca
name: Qodana Code Smell Detection

on:
  push:
    branches: [ "main" ]

jobs:
  qodana:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Qodana
        uses: JetBrains/qodana-action@v2023.3
        with:
          linter: jetbrains/qodana-jvm
