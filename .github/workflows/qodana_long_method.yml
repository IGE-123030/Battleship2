#122983 - Mariana Fonseca
name: Qodana - Long Method Detection

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  qodana-analysis:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do código
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Configurar o JDK (para projetos Java)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 3. Executar o Qodana para análise de code smells
      - name: Run Qodana inspection
        uses: jetbrains/qodana-action@v2023.3
        with:
          project-dir: .
          results-dir: ./qodana-results
          qodana-yaml: .qodana_long_method.yaml  
          fail-threshold: 0

      # 4. Publicar resultados como artefato do GitHub
      - name: Upload Qodana results
        uses: actions/upload-artifact@v3
        with:
          name: qodana-results
          path: ./qodana-results


      - name: Comment Qodana results on PR
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          message: |
            ✅ Qodana Code Smell Analysis completed!
            Results are available as an artifact.
