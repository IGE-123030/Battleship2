#122983 - Mariana Fonseca
name: Qodana - Long Method Detection

# Dispara a ação em pushes e pull requests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  qodana-analysis:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout do repositório
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Configurar JDK 17 (para projetos Java)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 3️⃣
      - name: Run Qodana inspection
        uses: jetbrains/qodana-action@v2023.3
        with:
          project-dir: .
          qodana-yaml: .qodana_long_method.yaml
          results-dir: ./qodana-results
          fail-threshold: 0  # falhar se houver qualquer problema

      # 4️⃣ Publicar resultados como artefato
      - name: Upload Qodana results
        uses: actions/upload-artifact@v4
        with:
          name: qodana-results
          path: ./qodana-results

      # 5️⃣ Comentar resultados no PR (se houver)
      - name: Comment Qodana results on PR
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          message: |
            ✅ Qodana Code Smell Analysis completed!
            Results are available as an artifact.