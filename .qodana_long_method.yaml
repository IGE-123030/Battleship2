#-------------------------------------------------------------------------------#
# Configuração de inspeções baseada no livro Lanza & Marinescu
# Para detecção de métodos longos (Long Method)
#-------------------------------------------------------------------------------#
version: "1.0"

linter: jetbrains/qodana-jvm

# Incluir apenas a inspeção relevante
include:
  - name: Java | Method metrics | Long method

# Configuração específica dos limites (Thresholds)
profile:
  name: LongMethodDetection
  inspections:
    - name: LongMethod
      severity: WARNING
      options:
        # Limite de linhas do método
        lines_limit: 30

# Define o "Quality Gate": falha se encontrar 1 problema crítico
failureConditions:
  severityThresholds:
    any: 1
